openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0
  description: API d'authentification et d'autorisation.
servers:
  - url: http://localhost
paths:
  /api/v1/auth/register:
    post:
      operationId: registerUser
      summary: Creer un compte utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              registerExample:
                value:
                  email: user@example.com
                  password: Password123!
                  fullName: Jean Dupont
                  locale: fr
      responses:
        '201':
          description: Compte cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
              examples:
                created:
                  value:
                    id: 9c2c2746-d063-4937-b58a-0f526996f1ea
                    email: user@example.com
                    full_name: Jean Dupont
                    locale: fr
                    role: USER
                    created_at: '2026-03-25T09:00:00.000Z'
          links:
            LoginAfterRegister:
              operationId: loginUser
              requestBody: '{"email": "$request.body#/email", "password": "$request.body#/password"}'
        '409':
          description: Email deja existant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emailExists:
                  value:
                    code: EMAIL_ALREADY_EXISTS
                    message: Un compte avec cet email existe deja.
          links:
            TryLogin:
              operationId: loginUser
              requestBody: '{"email": "$request.body#/email", "password": "$request.body#/password"}'
        '422':
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/login:
    post:
      operationId: loginUser
      summary: Se connecter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Jetons retournes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    accessToken: eyJhbGciOi...
                    refreshToken: d2be4f85-3f9a-4fce-8930-0381af89f31f.7a26...
                    expiresIn: 900
          links:
            RefreshAfterLogin:
              operationId: refreshAccessToken
              requestBody: '{"refreshToken": "$response.body#/refreshToken"}'
            LogoutAfterLogin:
              operationId: logoutUser
              requestBody: '{"refreshToken": "$response.body#/refreshToken"}'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          links:
            RegisterAfterLoginFailure:
              operationId: registerUser
              requestBody: '{"email": "$request.body#/email", "password": "$request.body#/password", "fullName": "Utilisateur"}'
  /api/v1/auth/refresh:
    post:
      operationId: refreshAccessToken
      summary: Renouveler le token d'acces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Nouveau token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          links:
            LogoutAfterRefresh:
              operationId: logoutUser
              requestBody: '{"refreshToken": "$request.body#/refreshToken"}'
        '401':
          description: Refresh token invalide ou expire
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      operationId: logoutUser
      summary: Invalider un refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Deconnexion effectuee
        '422':
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        locale:
          type: string
          enum: [fr, en]
        role:
          type: string
          enum: [ADMIN, EVENT_CREATOR, USER]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
    UserSummary:
      type: object
      required: [id, email, full_name, locale, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        locale:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

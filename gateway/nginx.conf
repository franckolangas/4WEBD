events {}

http {
  log_format upstreamlog '$remote_addr - $remote_user [$time_local] "$request" $status '
                         '"$http_referer" "$http_user_agent" '
                         'upstream_addr=$upstream_addr upstream_status=$upstream_status '
                         'request_time=$request_time upstream_response_time=$upstream_response_time';
  access_log /var/log/nginx/access.log upstreamlog;

  upstream auth_service { server auth-service:3000; }
  upstream user_service { server user-service:3000; }
  upstream event_service {
    server event-service:3000;
    server event-service-2:3000;
  }
  upstream inventory_service {
    server inventory-service:3000;
    server inventory-service-2:3000;
  }
  upstream order_service { server order-service:3000; }
  upstream payment_service { server payment-service:3000; }
  upstream notification_service { server notification-service:3000; }
  upstream docs_service { server docs-service:3000; }

  server {
    listen 80;
    client_max_body_size 10m;
    add_header X-Upstream-Addr $upstream_addr always;

    location = / {
      return 200 '{"name":"ticketing-api-gateway","status":"ok","links":{"health":"/health","docs":"/docs/","openapi":"/openapi/"}}';
      add_header Content-Type application/json;
    }

    location /health {
      return 200 '{"status":"ok","service":"gateway"}';
      add_header Content-Type application/json;
    }

    location /api/v1/auth { proxy_pass http://auth_service; }
    location /api/v1/users { proxy_pass http://user_service; }
    location /api/v1/events { proxy_pass http://event_service; }
    location /api/v1/inventory { proxy_pass http://inventory_service; }
    location /api/v1/orders { proxy_pass http://order_service; }
    location /api/v1/tickets { proxy_pass http://order_service; }
    location /api/v1/payments { proxy_pass http://payment_service; }
    location /api/v1/notifications { proxy_pass http://notification_service; }
    location = /docs { return 302 /docs/; }
    location /docs/ { proxy_pass http://docs_service/docs/; }

    location = /openapi { return 302 /openapi/; }
    location /openapi/ { proxy_pass http://docs_service/openapi/; }
  }
}
